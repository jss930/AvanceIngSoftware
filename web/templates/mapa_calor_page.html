{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
    }
</style>

<div class="container py-4">
    <div class="mb-3">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Volver al panel
        </a>
    </div>

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-gradient bg-primary text-white d-flex justify-content-between align-items-center rounded-top-4">
            <div class="d-flex align-items-center">
                <i class="bi bi-geo-alt-fill fs-4 me-2"></i>
                <h5 class="mb-0">Mapa de Calor de Reportes de Tráfico</h5>
            </div>
            <a href="{% url 'report_incident' %}" class="btn btn-light btn-sm fw-bold">
                <i class="bi bi-plus-circle me-1"></i> Nuevo Reporte
            </a>
        </div>
        <div class="card-body bg-light p-0" style="height: 78vh;">
            <iframe src="{% static 'mapa_calor.html' %}" width="100%" height="100%" style="border: 0;" loading="lazy"></iframe>
        </div>
        <div class="card-footer text-muted text-center small py-2">
            Visualización actualizada automáticamente según reportes ciudadanos
        </div>
    </div>
</div>
{% endblock %}
