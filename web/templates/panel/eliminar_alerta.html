<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Alerta | Traffic Pulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow rounded-4">
      <div class="card-header bg-danger text-white">
        <h4><i class="bi bi-trash me-2"></i>Eliminar Alerta</h4>
      </div>
      <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar la alerta <strong>{{ alerta.titulo }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          <a href="{% url 'gestionar_alertas' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
